spring.application.name=GameLog

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:gamelogdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# JWT
app.jwt.secret=GameLogSecretKey2026ChangeThisInProductionToSomethingMuchLonger
app.jwt.access-expiry-ms=900000
app.jwt.refresh-expiry-ms=604800000

# SpringDoc / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Server
server.port=8080

server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

server.servlet.session.tracking-modes=cookie

spring.mvc.contentnegotiation.default-content-type=text/html

logging.level.org.springframework.security=DEBUG