<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library — GameLog</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a14; --surface: #16162a; --surface-2: #1f1f3a;
            --border: #2f2f55; --neon-cyan: #00f0ff; --neon-magenta: #ff00ea;
            --neon-purple: #9d4edd; --neon-green: #00ff9c; --neon-yellow: #ffe066;
            --neon-orange: #ff8c42; --platinum: #c9c9d4;
            --text: #f0e9ff; --text-muted: #8888aa;
            --success: #00ff9c; --danger: #ff3860; --info: #00f0ff;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
        body::before { content: ''; position: fixed; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,0.018) 2px, rgba(0,240,255,0.018) 3px); z-index: 0; }
        a { color: var(--neon-cyan); text-decoration: none; }

        .navbar { background: var(--surface); border-bottom: 1px solid var(--neon-cyan); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 24px rgba(0,240,255,0.1); }
        .navbar-brand { display: flex; align-items: center; gap: 0.8rem; font-size: 1.4rem; font-weight: 900; color: var(--text); letter-spacing: 2px; text-transform: uppercase; font-family: 'Courier New', monospace; text-shadow: 0 0 12px rgba(0,240,255,0.4); }
        .navbar-brand .accent { background: linear-gradient(135deg, var(--neon-magenta) 0%, var(--neon-cyan) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .brand-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--neon-magenta) 0%, var(--neon-purple) 50%, var(--neon-cyan) 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 18px rgba(255,0,234,0.4); transform: rotate(-3deg); }
        .brand-icon svg { width: 24px; height: 24px; fill: var(--bg); }
        .navbar-nav { display: flex; align-items: center; gap: 1.5rem; list-style: none; }
        .navbar-nav a { color: var(--text-muted); font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; font-family: 'Courier New', monospace; }
        .navbar-nav a:hover { color: var(--neon-cyan); text-shadow: 0 0 8px rgba(0,240,255,0.5); }
        .user-badge { background: var(--surface-2); border: 1px solid var(--neon-cyan); border-radius: 2px; padding: 0.3rem 0.85rem; font-size: 0.72rem; color: var(--neon-cyan); font-weight: 700; letter-spacing: 1.5px; font-family: 'Courier New', monospace; text-transform: uppercase; }

        .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.1rem; border-radius: 2px; border: 1px solid transparent; font-size: 0.78rem; font-weight: 800; cursor: pointer; transition: all 0.2s; text-decoration: none; text-transform: uppercase; letter-spacing: 1.5px; font-family: 'Courier New', monospace; }
        .btn-primary { background: linear-gradient(135deg, var(--neon-magenta) 0%, var(--neon-purple) 100%); color: var(--text); }
        .btn-primary:hover { box-shadow: 0 4px 18px rgba(255,0,234,0.4); }
        .btn-outline { background: transparent; color: var(--text); border-color: var(--border); }
        .btn-outline:hover { background: var(--surface-2); border-color: var(--neon-cyan); color: var(--neon-cyan); }
        .btn-sm { padding: 0.32rem 0.8rem; font-size: 0.7rem; }
        .btn-danger-sm { background: transparent; color: var(--danger); border: 1px solid var(--danger); border-radius: 2px; padding: 0.32rem 0.8rem; font-size: 0.7rem; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1.5px; font-family: 'Courier New', monospace; }
        .btn-danger-sm:hover { background: var(--danger); color: var(--text); }

        .main { max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem; position: relative; z-index: 1; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; }
        .page-title { font-size: 1.9rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; font-family: 'Courier New', monospace; text-shadow: 0 0 15px rgba(0,240,255,0.3); }
        .page-title .accent { background: linear-gradient(135deg, var(--neon-magenta) 0%, var(--neon-cyan) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        .search-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 1.1rem 1.3rem; margin-bottom: 1.5rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: flex-end; box-shadow: 0 0 30px rgba(0,240,255,0.05); }
        .sg { display: flex; flex-direction: column; gap: 0.35rem; flex: 1; min-width: 130px; }
        .sg label { font-size: 0.68rem; color: var(--neon-cyan); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; font-family: 'Courier New', monospace; }
        .form-control, .form-select { background: var(--surface-2); border: 1.5px solid var(--border); color: var(--text); padding: 0.55rem 0.9rem; border-radius: 2px; font-size: 0.88rem; appearance: none; width: 100%; transition: all 0.2s; font-family: 'Courier New', monospace; }
        .form-control:focus, .form-select:focus { outline: none; border-color: var(--neon-cyan); }
        .form-control::placeholder { color: #5a5a80; }
        .check-wrap { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 0.9rem; background: var(--surface-2); border: 1.5px solid var(--border); border-radius: 2px; cursor: pointer; }
        .check-wrap input { accent-color: var(--neon-magenta); }
        .check-wrap label { font-size: 0.72rem; color: var(--neon-yellow); font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1.5px; font-family: 'Courier New', monospace; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.5rem; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: all 0.25s; display: flex; flex-direction: column; position: relative; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.6), 0 0 30px rgba(0,240,255,0.15); border-color: var(--neon-cyan); }
        .card.platinum { border: 1px solid var(--platinum); box-shadow: 0 0 20px rgba(201,201,212,0.15); }
        .card.goty-contender::after { content: ''; position: absolute; inset: 0; pointer-events: none; border-radius: 4px; border: 1px solid transparent; background: linear-gradient(135deg, var(--neon-magenta), var(--neon-cyan), var(--neon-yellow), var(--neon-magenta)) border-box; -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0.5; }

        .status-stripe { height: 4px; }
        .status-stripe.playing         { background: linear-gradient(90deg, var(--neon-magenta) 0%, var(--neon-cyan) 100%); }
        .status-stripe.beaten          { background: var(--neon-green); }
        .status-stripe.completed_100   { background: linear-gradient(90deg, var(--neon-yellow) 0%, var(--platinum) 100%); }
        .status-stripe.abandoned       { background: var(--danger); opacity: 0.4; }
        .status-stripe.on_hold         { background: var(--neon-orange); }
        .status-stripe.backlog         { background: var(--text-muted); }
        .status-stripe.wishlist        { background: var(--neon-purple); }
        .status-stripe.replaying       { background: linear-gradient(90deg, var(--neon-purple) 0%, var(--neon-cyan) 100%); }

        .platinum-badge { position: absolute; top: 12px; right: 12px; background: linear-gradient(135deg, var(--platinum) 0%, #9b9bb0 100%); color: var(--bg); padding: 0.3rem 0.7rem; border-radius: 2px; font-size: 0.62rem; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; box-shadow: 0 4px 12px rgba(201,201,212,0.4); z-index: 2; font-family: 'Courier New', monospace; display: flex; align-items: center; gap: 0.3rem; }

        .goty-ribbon { position: absolute; top: 14px; left: -36px; background: linear-gradient(135deg, var(--neon-yellow) 0%, var(--neon-orange) 100%); color: var(--bg); padding: 0.3rem 3rem; font-size: 0.6rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; transform: rotate(-45deg); box-shadow: 0 4px 12px rgba(255,224,102,0.4); z-index: 2; font-family: 'Courier New', monospace; }

        .now-playing-tag { position: absolute; top: 12px; right: 12px; background: linear-gradient(135deg, var(--neon-magenta) 0%, var(--neon-cyan) 100%); color: var(--text); padding: 0.3rem 0.75rem; border-radius: 2px; font-size: 0.6rem; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; display: flex; align-items: center; gap: 0.4rem; box-shadow: 0 0 14px rgba(255,0,234,0.5); z-index: 2; font-family: 'Courier New', monospace; }
        .now-playing-tag .blink { width: 6px; height: 6px; background: var(--neon-green); border-radius: 50%; animation: blink 1s ease-in-out infinite; box-shadow: 0 0 6px var(--neon-green); }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .card-header { padding: 1.25rem 1.25rem 0.6rem; }
        .dev-line { font-size: 0.7rem; font-weight: 700; color: var(--neon-cyan); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 0.3rem; font-family: 'Courier New', monospace; }
        .game-title { font-size: 1.2rem; font-weight: 900; color: var(--text); letter-spacing: -0.3px; line-height: 1.2; margin-bottom: 0.25rem; font-family: 'Courier New', monospace; text-transform: uppercase; }
        .game-title a { color: var(--text); }
        .game-title a:hover { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0,240,255,0.4); }
        .meta-mini { font-size: 0.72rem; color: var(--text-muted); font-family: 'Courier New', monospace; letter-spacing: 0.5px; }

        .card-body { padding: 0.5rem 1.25rem 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.7rem; }

        .badges-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .badge { display: inline-block; padding: 0.22rem 0.65rem; border-radius: 2px; font-size: 0.62rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; font-family: 'Courier New', monospace; }
        .badge-genre { background: rgba(157,78,221,0.15); color: var(--neon-purple); border: 1px solid rgba(157,78,221,0.35); }
        .badge-platform { background: rgba(0,240,255,0.1); color: var(--neon-cyan); border: 1px solid rgba(0,240,255,0.3); }
        .badge-status-playing         { background: rgba(255,0,234,0.12); color: var(--neon-magenta); border: 1px solid rgba(255,0,234,0.3); }
        .badge-status-beaten          { background: rgba(0,255,156,0.12); color: var(--neon-green); border: 1px solid rgba(0,255,156,0.3); }
        .badge-status-completed_100   { background: rgba(255,224,102,0.12); color: var(--neon-yellow); border: 1px solid rgba(255,224,102,0.3); }
        .badge-status-abandoned       { background: rgba(255,56,96,0.08); color: var(--danger); border: 1px solid rgba(255,56,96,0.25); }
        .badge-status-on_hold         { background: rgba(255,140,66,0.12); color: var(--neon-orange); border: 1px solid rgba(255,140,66,0.3); }
        .badge-status-backlog         { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }
        .badge-status-wishlist        { background: rgba(157,78,221,0.12); color: var(--neon-purple); border: 1px solid rgba(157,78,221,0.3); }
        .badge-status-replaying       { background: rgba(157,78,221,0.12); color: var(--neon-purple); border: 1px solid rgba(157,78,221,0.3); }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
        .stat-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 2px; padding: 0.6rem 0.75rem; display: flex; align-items: center; gap: 0.7rem; }
        .stat-icon { font-size: 1.1rem; }
        .stat-content { flex: 1; min-width: 0; }
        .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; font-family: 'Courier New', monospace; }
        .stat-value { font-size: 0.95rem; color: var(--neon-cyan); font-weight: 900; font-family: 'Courier New', monospace; text-shadow: 0 0 6px rgba(0,240,255,0.3); }

        .completion-block { background: var(--surface-2); border: 1px solid var(--border); border-radius: 2px; padding: 0.65rem 0.85rem; }
        .completion-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; margin-bottom: 0.4rem; }
        .completion-label { color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; font-family: 'Courier New', monospace; }
        .completion-value { color: var(--neon-green); font-weight: 900; font-family: 'Courier New', monospace; text-shadow: 0 0 6px rgba(0,255,156,0.4); }
        .completion-bar { height: 6px; background: var(--bg); border-radius: 1px; overflow: hidden; position: relative; }
        .completion-fill { height: 100%; background: linear-gradient(90deg, var(--neon-magenta) 0%, var(--neon-cyan) 50%, var(--neon-green) 100%); border-radius: 1px; box-shadow: 0 0 10px rgba(0,240,255,0.4); }

        .achievement-block { background: var(--surface-2); border: 1px solid rgba(255,224,102,0.25); border-radius: 2px; padding: 0.65rem 0.85rem; }
        .achievement-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; margin-bottom: 0.4rem; }
        .achievement-label { color: var(--neon-yellow); font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; font-family: 'Courier New', monospace; }
        .achievement-value { color: var(--neon-yellow); font-weight: 900; font-family: 'Courier New', monospace; text-shadow: 0 0 6px rgba(255,224,102,0.4); }
        .achievement-bar { height: 6px; background: var(--bg); border-radius: 1px; overflow: hidden; }
        .achievement-fill { height: 100%; background: linear-gradient(90deg, var(--neon-yellow) 0%, var(--neon-orange) 100%); border-radius: 1px; box-shadow: 0 0 8px rgba(255,224,102,0.4); }

        .stars-row { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
        .stars { display: inline-flex; gap: 0.1rem; font-size: 1rem; }
        .star-filled { color: var(--neon-yellow); text-shadow: 0 0 6px rgba(255,224,102,0.5); }
        .star-empty { color: var(--border); }
        .comfort-pill { background: rgba(157,78,221,0.1); color: var(--neon-purple); padding: 0.18rem 0.6rem; border-radius: 2px; font-size: 0.6rem; font-weight: 800; border: 1px solid rgba(157,78,221,0.3); font-family: 'Courier New', monospace; letter-spacing: 1px; text-transform: uppercase; }

        .card-footer { display: flex; gap: 0.5rem; padding: 0.7rem 1.25rem; border-top: 1px solid var(--border); background: var(--surface-2); }

        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
        .empty-state h3 { color: var(--neon-cyan); font-size: 1.2rem; margin-bottom: 0.5rem; letter-spacing: 2px; text-transform: uppercase; font-family: 'Courier New', monospace; }
        .alert-success { padding: 0.85rem 1rem; border-radius: 2px; margin-bottom: 1.25rem; font-size: 0.88rem; background: rgba(0,255,156,0.1); border: 1px solid rgba(0,255,156,0.4); color: var(--success); font-weight: 600; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/games}">
        <span class="brand-icon"><svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg></span>
        <span><span class="accent">Game</span>Log</span>
    </a>
    <ul class="navbar-nav">
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/games/new}">+ Add Game</a></li>
        <li><a href="/swagger-ui.html" target="_blank">API</a></li>
        <li><span class="user-badge" sec:authentication="name">user</span></li>
        <li>
            <form th:action="@{/auth/logout}" method="post" style="display:inline">
                <button type="submit" class="btn btn-outline btn-sm">Logout</button>
            </form>
        </li>
    </ul>
</nav>

<div class="main">
    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>

    <div class="page-header">
        <h1 class="page-title">My <span class="accent">Library</span></h1>
        <span class="user-badge" th:text="${games.size()} + ' titles'"></span>
    </div>

    <form class="search-bar" th:action="@{/games}" method="get">
        <div class="sg" style="flex:2; min-width:200px;">
            <label>Title / Dev / Protagonist</label>
            <input class="form-control" type="text" name="query" th:value="${query}" placeholder="e.g. Elden Ring, FromSoftware, Tarnished...">
        </div>
        <div class="sg">
            <label>Genre</label>
            <select class="form-select" name="genre">
                <option value="">All</option>
                <option th:each="g : ${genres}" th:value="${g}"
                        th:text="${#strings.replace(g.name(),'_',' ')}"
                        th:selected="${selectedGenre == g}"></option>
            </select>
        </div>
        <div class="sg">
            <label>Platform</label>
            <select class="form-select" name="platform">
                <option value="">All</option>
                <option th:each="p : ${platforms}" th:value="${p}"
                        th:text="${#strings.replace(p.name(),'_',' ')}"
                        th:selected="${selectedPlatform == p}"></option>
            </select>
        </div>
        <div class="sg">
            <label>Status</label>
            <select class="form-select" name="status">
                <option value="">All</option>
                <option th:each="s : ${statuses}" th:value="${s}"
                        th:text="${#strings.replace(s.name(),'_',' ')}"
                        th:selected="${selectedStatus == s}"></option>
            </select>
        </div>
        <div class="check-wrap">
            <input id="gotyOnly" type="checkbox" name="gotyOnly" value="true" th:checked="${gotyOnly}">
            <label for="gotyOnly">★ GOTY Only</label>
        </div>
        <div style="display:flex; gap:0.5rem; align-items:flex-end;">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/games}" class="btn btn-outline">Clear</a>
        </div>
    </form>

    <div th:if="${games.isEmpty()}" class="empty-state">
        <h3>// Empty Library</h3>
        <p>Add your first game to start your library.</p>
    </div>

    <div class="grid" th:unless="${games.isEmpty()}">
        <div class="card" th:each="game : ${games}"
             th:classappend="${(game.platinumTrophy ? 'platinum ' : '') + (game.gotyContender ? 'goty-contender' : '')}">
            <div class="status-stripe" th:classappend="${#strings.toLowerCase(game.status.name())}"></div>

            <span class="now-playing-tag" th:if="${game.status.name() == 'PLAYING' or game.status.name() == 'REPLAYING'}">
                <span class="blink"></span>
                <span th:text="${game.status.name() == 'REPLAYING'} ? 'NG+' : 'Playing'"></span>
            </span>

            <span class="platinum-badge" th:if="${game.platinumTrophy and game.status.name() != 'PLAYING' and game.status.name() != 'REPLAYING'}">
                ⬢ Platinum
            </span>

            <span class="goty-ribbon" th:if="${game.gotyContender}">GOTY</span>

            <div class="card-header">
                <div class="dev-line">
                    <span th:text="${game.developer}"></span>
                    <span th:if="${game.releaseYear != null}" th:text="' · ' + ${game.releaseYear}"></span>
                </div>
                <div class="game-title">
                    <a th:href="@{/games/{id}(id=${game.id})}" th:text="${game.title}"></a>
                </div>
                <div class="meta-mini"
                     th:if="${game.mainProtagonist != null and !game.mainProtagonist.isBlank()}"
                     th:text="'as ' + ${game.mainProtagonist}"></div>
            </div>

            <div class="card-body">
                <div class="badges-row">
                    <span class="badge"
                          th:classappend="'badge-status-' + ${#strings.toLowerCase(game.status.name())}"
                          th:text="${#strings.replace(game.status.name(),'_',' ')}"></span>
                    <span class="badge badge-genre"
                          th:text="${#strings.replace(game.genre.name(),'_',' ')}"></span>
                    <span class="badge badge-platform"
                          th:text="${#strings.replace(game.platform.name(),'_',' ')}"></span>
                </div>

                <div class="stats-row">
                    <div class="stat-card" th:if="${game.hoursPlayed != null and game.hoursPlayed > 0}">
                        <span class="stat-icon">⏱</span>
                        <div class="stat-content">
                            <div class="stat-label">Hours</div>
                            <div class="stat-value" th:text="${game.hoursPlayed}"></div>
                        </div>
                    </div>
                    <div class="stat-card" th:if="${game.pricePaidEur != null}">
                        <span class="stat-icon">💸</span>
                        <div class="stat-content">
                            <div class="stat-label">Paid</div>
                            <div class="stat-value" th:text="'€' + ${game.pricePaidEur}"></div>
                        </div>
                    </div>
                </div>

                <div class="completion-block" th:if="${game.completionPercent != null and game.completionPercent > 0}">
                    <div class="completion-header">
                        <span class="completion-label">▸ Story Completion</span>
                        <span class="completion-value" th:text="${game.completionPercent} + '%'"></span>
                    </div>
                    <div class="completion-bar">
                        <div class="completion-fill" th:style="'width:' + ${game.completionPercent} + '%'"></div>
                    </div>
                </div>

                <div class="achievement-block"
                     th:if="${game.achievementsTotal != null and game.achievementsTotal > 0 and game.achievementsUnlocked != null}"
                     th:with="achPct=${(game.achievementsUnlocked * 100) / game.achievementsTotal}">
                    <div class="achievement-header">
                        <span class="achievement-label">⬢ Achievements</span>
                        <span class="achievement-value"
                              th:text="${game.achievementsUnlocked} + ' / ' + ${game.achievementsTotal}"></span>
                    </div>
                    <div class="achievement-bar">
                        <div class="achievement-fill" th:style="'width:' + ${achPct} + '%'"></div>
                    </div>
                </div>

                <div class="stars-row">
                    <div class="stars" th:if="${game.rating != null}">
                        <span th:each="i : ${#numbers.sequence(1,5)}"
                              th:classappend="${i <= game.rating} ? 'star-filled' : 'star-empty'"
                              th:text="${i <= game.rating} ? '★' : '☆'"></span>
                    </div>
                    <span class="comfort-pill" th:if="${game.comfortGame}">♥ Comfort</span>
                </div>
            </div>

            <div class="card-footer" sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/games/edit/{id}(id=${game.id})}" class="btn btn-outline btn-sm">Edit</a>
                <form th:action="@{/games/delete/{id}(id=${game.id})}" method="post"
                      onsubmit="return confirm('Remove this game?')">
                    <button type="submit" class="btn-danger-sm">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
