<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — GameLog</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a14; --surface: #16162a; --surface-2: #1f1f3a;
            --border: #2f2f55; --neon-cyan: #00f0ff; --neon-magenta: #ff00ea;
            --neon-purple: #9d4edd; --neon-green: #00ff9c;
            --text: #f0e9ff; --text-muted: #8888aa; --danger: #ff3860;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; position: relative; overflow: hidden; }
        body::before { content: ''; position: fixed; inset: 0; pointer-events: none; background: radial-gradient(circle at 20% 30%, rgba(255,0,234,0.18) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(0,240,255,0.18) 0%, transparent 50%); z-index: 0; }
        body::after { content: ''; position: fixed; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,0.025) 2px, rgba(0,240,255,0.025) 3px); z-index: 0; }

        .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2.75rem 2rem; width: 100%; max-width: 420px; box-shadow: 0 0 60px rgba(255,0,234,0.15), 0 0 80px rgba(0,240,255,0.1); position: relative; z-index: 1; clip-path: polygon(0 12px, 12px 0, calc(100% - 12px) 0, 100% 12px, 100% calc(100% - 12px), calc(100% - 12px) 100%, 12px 100%, 0 calc(100% - 12px)); }
        .corner-glow { position: absolute; width: 28px; height: 28px; border-color: var(--neon-cyan); }
        .corner-glow.tl { top: 4px; left: 4px; border-top: 2px solid; border-left: 2px solid; }
        .corner-glow.tr { top: 4px; right: 4px; border-top: 2px solid; border-right: 2px solid; }
        .corner-glow.bl { bottom: 4px; left: 4px; border-bottom: 2px solid; border-left: 2px solid; }
        .corner-glow.br { bottom: 4px; right: 4px; border-bottom: 2px solid; border-right: 2px solid; }

        .brand-section { text-align: center; margin-bottom: 2rem; }
        .brand-icon { width: 78px; height: 78px; margin: 0 auto 1rem; background: linear-gradient(135deg, var(--neon-magenta) 0%, var(--neon-purple) 50%, var(--neon-cyan) 100%); border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 30px rgba(255,0,234,0.4); transform: rotate(-3deg); }
        .brand-icon svg { width: 42px; height: 42px; fill: var(--bg); }
        .brand { font-size: 1.5rem; font-weight: 900; color: var(--text); letter-spacing: 2.5px; margin-bottom: 0.5rem; text-transform: uppercase; font-family: 'Courier New', monospace; text-shadow: 0 0 20px rgba(0,240,255,0.5); }
        .subtitle { color: var(--neon-cyan); font-size: 0.78rem; letter-spacing: 3px; text-transform: uppercase; font-family: 'Courier New', monospace; text-shadow: 0 0 10px rgba(0,240,255,0.5); }
        .pixel-divider { display: flex; align-items: center; justify-content: center; gap: 4px; margin: 0.6rem 0; height: 12px; }
        .pixel-divider .px { width: 8px; height: 8px; background: var(--neon-cyan); box-shadow: 0 0 8px var(--neon-cyan); }
        .pixel-divider .px:nth-child(even) { background: var(--neon-magenta); box-shadow: 0 0 8px var(--neon-magenta); }

        .form-group { margin-bottom: 1.1rem; }
        .form-label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.4rem; font-family: 'Courier New', monospace; }
        .form-control { width: 100%; background: var(--surface-2); border: 1.5px solid var(--border); color: var(--text); padding: 0.75rem 1rem; border-radius: 2px; font-size: 0.95rem; transition: all 0.2s; font-family: 'Courier New', monospace; }
        .form-control:focus { outline: none; border-color: var(--neon-cyan); background: var(--bg); box-shadow: 0 0 0 2px rgba(0,240,255,0.2); }
        .form-control::placeholder { color: #5a5a80; }
        .btn-submit { display: block; width: 100%; padding: 0.9rem; background: linear-gradient(135deg, var(--neon-magenta) 0%, var(--neon-purple) 100%); color: var(--text); border: none; border-radius: 2px; font-size: 0.85rem; font-weight: 900; cursor: pointer; margin-top: 1.5rem; letter-spacing: 3px; text-transform: uppercase; transition: all 0.2s; box-shadow: 0 6px 24px rgba(255,0,234,0.35); font-family: 'Courier New', monospace; }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(255,0,234,0.5); }
        .alert-danger { padding: 0.75rem 1rem; border-radius: 2px; margin-bottom: 1.25rem; font-size: 0.85rem; background: rgba(255,56,96,0.1); border: 1px solid rgba(255,56,96,0.4); color: var(--danger); font-family: 'Courier New', monospace; }
        .field-error { color: var(--danger); font-size: 0.78rem; margin-top: 0.25rem; font-family: 'Courier New', monospace; }
        .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.82rem; color: var(--text-muted); font-family: 'Courier New', monospace; }
        .footer-link a { color: var(--neon-cyan); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
<div class="auth-box">
    <span class="corner-glow tl"></span><span class="corner-glow tr"></span>
    <span class="corner-glow bl"></span><span class="corner-glow br"></span>

    <div class="brand-section">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2z"/></svg>
        </div>
        <div class="brand">Create Save File</div>
        <div class="pixel-divider">
            <span class="px"></span><span class="px"></span><span class="px"></span>
            <span class="px"></span><span class="px"></span><span class="px"></span>
        </div>
        <div class="subtitle">// NEW GAME +</div>
    </div>

    <div th:if="${errorMessage}" class="alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}">
        <div class="form-group">
            <label class="form-label" for="username">Player ID</label>
            <input id="username" class="form-control" type="text" th:field="*{username}" placeholder="your_handle" autocomplete="username">
            <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>
        <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input id="email" class="form-control" type="email" th:field="*{email}" placeholder="you@example.com" autocomplete="email">
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Access Code</label>
            <input id="password" class="form-control" type="password" th:field="*{password}" placeholder="min. 6 characters" autocomplete="new-password">
            <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
        <button type="submit" class="btn-submit">Start Adventure</button>
    </form>

    <div class="footer-link">Returning player? <a th:href="@{/auth/login}">Load Save</a></div>
</div>
</body>
</html>
